<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link rel="icon" href="/src/logo.svg" type="image/svg+xml" />
    <title>CookieFarm Dashboard</title>
    <script>
      (() => {
        const storageKey = "cookiefarm-theme-mode";
        const storedMode = localStorage.getItem(storageKey);
        const systemMode = window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
        const mode = storedMode === "dark" || storedMode === "light" ? storedMode : systemMode;
        document.documentElement.setAttribute("data-theme", "kumo");
        document.documentElement.setAttribute("data-mode", mode);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
