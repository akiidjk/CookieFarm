# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go work sync

builds:
  - id: client
    main: ./client/main.go
    binary: ckc
    env:
      - CGO_ENABLED=1
      - GO111MODULE=on
      - GOFLAGS=-trimpath
      - GODEBUG=asyncpreemptoff=1
      - VERSION={{.Tag}}
    flags:
      - -trimpath
    ldflags:
      - "-s -w -X main.Version={{.Tag}}"
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_ {{- title .Os }}_ {{- if eq .Arch "amd64" }}x86_64 {{-
      else if eq .Arch "386" }}i386 {{- else }}{{ .Arch }}{{ end }} {{- if .Arm
      }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^tests:"
      - "^scripts:"
      - "^tools:"
      - "^monitoring:"

release:
  name_template: "CookieFarm release {{.Tag}}"
  header: |
    Welcome to this new release of CookieFarm! 🍪

  footer: |
    **Full Changelog**: https://github.com/ByteTheCookies/CookieFarm/compare/{{.PreviousTag}}...{{.Tag}}

    Make by ByteTheCookies with ❤️ and cookies

report_sizes: true

announce:
  discord:
    enabled: true
    message_template: "New **CookieFarm** release {{.Tag}} is out! **Full
      Changelog**:
      https://github.com/ByteTheCookies/CookieFarm/compare/{{.PreviousTag}}...{\
      {.Tag}} **More info**:
      https://github.com/ByteTheCookies/CookieFarm/releases/tag/{{.Tag}}"
    author: "ByteTheCookies"
    color: "13476184"
    icon_url: "https://bytethecookies.github.io/logo/logo.png"
