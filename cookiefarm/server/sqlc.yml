version: "2"
sql:
  - engine: "sqlite"
    queries: "query.sql"
    schema: "./internal/database/schema.sql"
    gen:
      go:
        package: "database"
        out: "internal/database"
        emit_json_tags: true
        json_tags_case_style: "snake"
        overrides:
          - column: "flags.port_service"
            go_type:
              import: ""
              type: "uint16"
          - column: "flags.submit_time"
            go_type:
              import: ""
              type: "uint64"
          - column: "flags.response_time"
            go_type:
              import: ""
              type: "uint64"
